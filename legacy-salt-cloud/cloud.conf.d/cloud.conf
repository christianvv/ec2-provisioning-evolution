# Global salt-cloud configuration
#
# Placed in /etc/salt/cloud.conf.d/ on the salt-cloud master.
# Settings here apply as defaults across all providers, profiles, and maps
# unless overridden at the profile or provider level.


##########################################
#####          VM Defaults           #####
##########################################

# Name of the deploy script salt-cloud renders and executes over SSH on each
# new instance. Resolves to a file in /etc/salt/cloud.deploy.d/ on the master.
# The script name here corresponds to bootstrap-scripts/bootstrap-minion.sh
# (deployed to cloud.deploy.d/ on the salt-cloud master).
script: bootstrap-minion


##########################################
#####         Logging Settings       #####
##########################################

# Log file for all salt-cloud activity
log_file: /var/log/salt/cloud


##########################################
#####         Misc Defaults          #####
##########################################

# Remove the instance's SSH host key from the master's known_hosts file when
# the instance is destroyed, keeping known_hosts clean for future reuse of
# the same hostname or IP.
delete_sshkeys: True
