# AWS EC2 provider configuration — DevOps Tooling VPC
#
# Placed in /etc/salt/cloud.providers.d/ on the salt-cloud master.
# As of Salt v2015.8, 'driver' replaces the older 'provider' key.
#
# All values below are illustrative placeholders.
# Replace account IDs, IAM ARNs, key names/paths, and the master IP
# with real environment values before use.

# ── Base provider block ────────────────────────────────────────────────────────
# Shared settings inherited by all named providers via 'extends'.

devops_ec2_base:
  driver: ec2

  # The salt-cloud master runs inside AWS and carries an IAM instance profile
  # with EC2 permissions. Using instance role credentials avoids storing static
  # access keys on disk.
  id: 'use-instance-role-credentials'
  key: 'use-instance-role-credentials'

  # Target region
  location: us-east-1

  # Restrict AMI queries to this AWS account (avoids pulling public marketplace
  # AMIs when listing images, which can make salt-cloud appear to hang).
  owner: '123456789012'  # example placeholder — replace with your AWS account ID

  # All provisioning happens from inside the VPC, so connect via private IP.
  # Valid options: private_ips | public_ips
  ssh_interface: private_ips

  # CentOS 7 default SSH user
  ssh_username: centos

  # IAM instance profile applied to every provisioned instance
  iam_profile: 'arn:aws:iam::123456789012:instance-profile/DevOpsInstanceProfile'  # example placeholder


# ── Named provider: DevOps VPC ─────────────────────────────────────────────────
# Provider instance used by all profiles targeting the DevOps tooling VPC.
# Extends the base block and adds VPC-specific minion, key, and grain config.

devops_vpc:
  extends: devops_ec2_base

  # Salt minion configuration injected into each provisioned instance.
  # Points the minion at the salt-master running inside the same VPC.
  minion:
    master: 10.0.1.10  # example placeholder — private IP of salt-master

  # EC2 key pair used for initial SSH access during the bootstrap phase.
  # The key file must be owned by root with permissions 0400.
  private_key: /etc/salt/devops-vpc-key.pem  # example placeholder
  keyname: devops-vpc-key                    # example placeholder

  # Grain set on all instances provisioned through this provider.
  # Useful for targeting via Salt's grain matching after bootstrap.
  grains:
    cloud: devops-vpc
