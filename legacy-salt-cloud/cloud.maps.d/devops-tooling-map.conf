# DevOps tooling VPC — instance map
#
# Placed in /etc/salt/cloud.maps.d/ on the salt-cloud master.
# A map ties named minion IDs to profiles, letting salt-cloud provision
# the full environment in a single command.
#
# Launch the entire map:
#   salt-cloud -m /etc/salt/cloud.maps.d/devops-tooling-map.conf
#
# Dry run (query what would be launched without provisioning):
#   salt-cloud -m /etc/salt/cloud.maps.d/devops-tooling-map.conf --query
#
# Each top-level key is a profile name from cloud.profiles.d/.
# Each value is a list of minion IDs to provision with that profile.
# Minion IDs become the instance Name tag and the Salt minion ID.

# Source control server — GitLab CE
devops_centos7_az1_large:
  - devops-gitlab-01

# Artifact and package repository — Nexus Repository Manager
devops_centos7_az1_large:
  - devops-nexus-01

# Directory services / LDAP authentication
devops_centos7_az1_small:
  - devops-ldap-01

# GitLab Runner host — executes CI/CD jobs via the Docker executor
devops_centos7_az1_medium:
  - devops-gitlabrunner-01

# Monitoring and metrics stack
devops_centos7_az2_medium:
  - devops-monitor-01

# Secondary Salt master (redundancy, same-VPC failover)
devops_centos7_az2_small:
  - devops-saltmaster-02
