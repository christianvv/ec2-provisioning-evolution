# Instance profiles for the DevOps tooling VPC
#
# Placed in /etc/salt/cloud.profiles.d/ on the salt-cloud master.
#
# Design:
#   - Two base profiles, one per private subnet / availability zone (az1, az2).
#   - Each base profile is subnet-specific but otherwise identical in AMI,
#     storage, lifecycle flags, and tagging.
#   - Size variants are defined as thin extensions of a base profile using
#     the 'extends' key, keeping the size matrix DRY while retaining full
#     per-profile overridability.
#   - Networking resources (subnets, security groups) were pre-provisioned
#     outside salt-cloud and are referenced here by placeholder IDs.
#   - All placeholder values (AMI ID, subnet IDs, SG ID) are illustrative.
#     Replace them with real resource IDs before use.
#
# Typical launch command:
#   salt-cloud -p devops_centos7_az1_medium devops-gitlab-01
#
# Or via map:
#   salt-cloud -m /etc/salt/cloud.maps.d/devops-tooling-map.conf

# ── AZ1 base profile (us-east-1b) ─────────────────────────────────────────────

devops_centos7_az1:
  provider: devops_vpc
  # CentOS 7 x86_64 HVM EBS — illustrative placeholder; substitute a real AMI ID
  image: ami-xxxxxxxxxxxxxxxxx
  ssh_username: centos
  availability_zone: us-east-1b

  network_interfaces:
    - DeviceIndex: 0
      PrivateIpAddresses:
        - Primary: True
      SubnetId: subnet-xxxxxxxx    # example placeholder — private subnet in us-east-1b
      SecurityGroupId:
        - sg-xxxxxxxx              # example placeholder — DevOps VPC instance SG

  block_device_mappings:
    - DeviceName: /dev/sda1
      Ebs.VolumeSize: 20
      Ebs.VolumeType: gp2
    - DeviceName: /dev/sdb
      Ebs.VolumeSize: 20
      Ebs.VolumeType: gp2

  # Clean up all associated EBS volumes when an instance is destroyed.
  del_root_vol_on_destroy: True
  del_all_vol_on_destroy: True
  # Rename the instance (rather than terminate immediately) on destroy, allowing
  # a brief window to confirm the correct instance before permanent deletion.
  rename_on_destroy: True

  tag:
    Environment: DevOps-VPC
    Type: DevOps-VPC-Instance
    Name: devops-
    CreatedBy: salt-cloud
    Project: ''

  # Sync all Salt modules, grains, pillar, etc. to the minion immediately after
  # the bootstrap completes and the minion checks in.
  sync_after_install: all

# Size variants — AZ1
devops_centos7_az1_micro:
  size: t2.micro
  extends: devops_centos7_az1

devops_centos7_az1_small:
  size: t2.small
  extends: devops_centos7_az1

devops_centos7_az1_medium:
  size: t2.medium
  extends: devops_centos7_az1

devops_centos7_az1_large:
  size: m4.large
  extends: devops_centos7_az1

devops_centos7_az1_xlarge:
  size: m4.xlarge
  extends: devops_centos7_az1

devops_centos7_az1_2xlarge:
  size: m4.2xlarge
  extends: devops_centos7_az1

devops_centos7_az1_clarge:
  size: c4.large
  extends: devops_centos7_az1

devops_centos7_az1_cxlarge:
  size: c4.xlarge
  extends: devops_centos7_az1

devops_centos7_az1_c2xlarge:
  size: c4.2xlarge
  extends: devops_centos7_az1

devops_centos7_az1_rlarge:
  size: r4.large
  extends: devops_centos7_az1

devops_centos7_az1_rxlarge:
  size: r4.xlarge
  extends: devops_centos7_az1

devops_centos7_az1_r2xlarge:
  size: r4.2xlarge
  extends: devops_centos7_az1


# ── AZ2 base profile (us-east-1c) ─────────────────────────────────────────────

devops_centos7_az2:
  provider: devops_vpc
  image: ami-xxxxxxxxxxxxxxxxx  # example placeholder — same CentOS 7 AMI
  ssh_username: centos
  availability_zone: us-east-1c

  network_interfaces:
    - DeviceIndex: 0
      PrivateIpAddresses:
        - Primary: True
      SubnetId: subnet-yyyyyyyy    # example placeholder — private subnet in us-east-1c
      SecurityGroupId:
        - sg-xxxxxxxx              # example placeholder — DevOps VPC instance SG

  block_device_mappings:
    - DeviceName: /dev/sda1
      Ebs.VolumeSize: 20
      Ebs.VolumeType: gp2
    - DeviceName: /dev/sdb
      Ebs.VolumeSize: 20
      Ebs.VolumeType: gp2

  del_root_vol_on_destroy: True
  del_all_vol_on_destroy: True
  rename_on_destroy: True

  tag:
    Environment: DevOps-VPC
    Type: DevOps-VPC-Instance
    Name: devops-
    CreatedBy: salt-cloud
    Project: ''

  sync_after_install: all

# Size variants — AZ2
devops_centos7_az2_micro:
  size: t2.micro
  extends: devops_centos7_az2

devops_centos7_az2_small:
  size: t2.small
  extends: devops_centos7_az2

devops_centos7_az2_medium:
  size: t2.medium
  extends: devops_centos7_az2

devops_centos7_az2_large:
  size: m4.large
  extends: devops_centos7_az2

devops_centos7_az2_xlarge:
  size: m4.xlarge
  extends: devops_centos7_az2

devops_centos7_az2_2xlarge:
  size: m4.2xlarge
  extends: devops_centos7_az2

devops_centos7_az2_clarge:
  size: c4.large
  extends: devops_centos7_az2

devops_centos7_az2_cxlarge:
  size: c4.xlarge
  extends: devops_centos7_az2

devops_centos7_az2_c2xlarge:
  size: c4.2xlarge
  extends: devops_centos7_az2

devops_centos7_az2_rlarge:
  size: r4.large
