name: Terraform validation and LocalStack apply/destroy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt-and-validate:
    name: Format check and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive modern-terraform/

      - name: Validate bootstrap config
        working-directory: modern-terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate root config
        working-directory: modern-terraform
        run: |
          terraform init -backend=false
          terraform validate

  localstack-plan-apply:
    name: LocalStack plan / apply / destroy
    runs-on: ubuntu-latest
    needs: fmt-and-validate

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack..."
          timeout 60 bash -c 'until curl -sf http://localhost:4566/_localstack/health | grep -q "running"; do sleep 2; done'
          echo "LocalStack is ready"

      - name: Write bootstrap provider override
        run: |
          cat > modern-terraform/bootstrap/provider_override.tf << 'EOF'
          # For use with LocalStack
          provider "aws" {
            region = "us-east-1"

            access_key                  = "test"
            secret_key                  = "test"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            s3_use_path_style           = true

            endpoints {
              s3 = "http://localhost:4566"
            }
          }
          EOF

      - name: Bootstrap — init and apply
        working-directory: modern-terraform/bootstrap
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Write root config provider override
        run: |
          cat > modern-terraform/provider_override.tf << 'EOF'
          # For LocalStack-specific credential override
          provider "aws" {
            region = "us-east-1"

            access_key                  = "test"
            secret_key                  = "test"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            s3_use_path_style           = true

            endpoints {
              s3  = "http://localhost:4566"
              ec2 = "http://localhost:4566"
            }
          }
          EOF

      - name: Write backend_local.hcl
        run: |
          cat > modern-terraform/backend_local.hcl << 'EOF'
          endpoints = {
              s3 = "http://localhost:4566"
          }
          access_key                  = "test"
          secret_key                  = "test"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF

      - name: Write terraform.tfvars
        run: |
          cat > modern-terraform/terraform.tfvars << 'EOF'
          admin_cidr = "203.0.113.0/32"
          EOF

      - name: Root config — init
        working-directory: modern-terraform
        run: terraform init -backend-config=backend_local.hcl

      - name: Root config — plan
        working-directory: modern-terraform
        run: terraform plan

      - name: Root config — apply
        working-directory: modern-terraform
        run: terraform apply -auto-approve

      - name: Verify — list created resources
        working-directory: modern-terraform
        run: terraform state list

      - name: Root config — destroy
        working-directory: modern-terraform
        if: always()
        run: terraform destroy -auto-approve

      - name: Bootstrap — destroy
        working-directory: modern-terraform/bootstrap
        if: always()
        run: terraform destroy -auto-approve
